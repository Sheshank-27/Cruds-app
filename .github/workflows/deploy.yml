name: Deploy to ECS

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::881490100241:role/github-ecs-role
          aws-region: ap-south-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/crud-app-repo:$IMAGE_TAG .
          docker push $ECR_REGISTRY/crud-app-repo:$IMAGE_TAG

      - name: Download Task Definition
        run: |
          aws ecs describe-task-definition \
            --task-definition crud-task \
            --query taskDefinition > task-definition.json

      - name: Fill New Image
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/crud-app-repo:${{ github.sha }}
          jq --arg IMAGE "$IMAGE_URI" \
          '.containerDefinitions[0].image=$IMAGE |
           del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
          task-definition.json > new-task-definition.json

      - name: Register New Task Definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://new-task-definition.json

      - name: Get Latest Revision
        id: taskdef
        run: |
          REVISION=$(aws ecs describe-task-definition \
            --task-definition crud-task \
            --query "taskDefinition.revision" \
            --output text)
          echo "revision=$REVISION" >> $GITHUB_OUTPUT

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster crud-cluster \
            --service crud-service \
            --task-definition crud-task:${{ steps.taskdef.outputs.revision }}